
push-remote = "origin"
tag-name = "{{version}}"
publish = false

pre-release-replacements = [
  {file="CHANGELOG.md", search="# Unreleased", replace="# Unreleased\n\n# {{version}} - {{date}}"},
  {file="flake.nix", search="version = \".*\";", replace="version = \"{{version}}\";"},
  {file="HomebrewFormula/eilmeldung.rb", search="version .*", replace="version \"{{version}}\""},
  {file="HomebrewFormula/eilmeldung.rb", search="sha256 .*", replace="sha256 \"replaced by CI on release of {{version}}\""},
  {file="HomebrewFormula/eilmeldung.rb", search="tags/[0-9.]+", replace="tags/{{version}}."},
  {file="ScoopBucket/eilmeldung.json", search="\"hash\": .*", replace="\"hash\": \"replaced by CI on release of {{version}}\""},
  {file="ScoopBucket/eilmeldung.json", search="download/[0-9.]+/", replace="download/{{version}}/"},
  {file="ScoopBucket/eilmeldung.json", search="msvc-[0-9.]+", replace="msvc-{{version}}."},
]

